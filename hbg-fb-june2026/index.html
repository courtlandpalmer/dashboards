<style>
:root{--green:#454f38;--green-deep:#363d2b;--offwhite:#efedea;--castiron:#2b291f;--mustard:#c8ab60;--neg:#9b4a38}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--green-deep);font-family:'Montserrat',sans-serif}
.card{background:var(--offwhite);border-radius:4px;padding:48px 44px;max-width:420px;width:92%;text-align:center;box-shadow:0 18px 60px rgba(0,0,0,.35)}
.brand{font-family:'Cormorant Garamond',serif;font-size:26px;letter-spacing:.34em;color:var(--castiron);text-transform:uppercase}
.eyebrow{font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--mustard);font-weight:500;margin:16px 0 6px}
h1{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:24px;color:var(--castiron);line-height:1.25}
p.note{font-size:12px;color:#7c7a70;margin:14px 0 24px;line-height:1.6}
input{width:100%;padding:13px 14px;font-size:18px;letter-spacing:.4em;text-align:center;border:1px solid rgba(43,41,31,.25);border-radius:3px;background:#fff;color:var(--castiron);font-family:'Montserrat',sans-serif}
input:focus{outline:2px solid var(--green)}
button{width:100%;margin-top:14px;padding:13px;font-size:11px;letter-spacing:.22em;text-transform:uppercase;font-weight:500;color:var(--offwhite);background:var(--green);border:none;border-radius:3px;cursor:pointer}
button:hover{background:#37402c}
.err{display:none;margin-top:14px;font-size:12px;color:var(--neg)}
.load{display:none;margin-top:14px;font-size:12px;color:#7c7a70}
.foot{margin-top:26px;font-size:10px;letter-spacing:.08em;color:#9a988e;text-transform:uppercase}
</style>
</head>

const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function unlock(pw){
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(SALT),iterations:310000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const gz=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(IV)},key,b64(CT));
  const ds=new DecompressionStream('gzip');
  const stream=new Blob([gz]).stream().pipeThrough(ds);
  const html=await new Response(stream).text();
  document.open();document.write(html);document.close();
}
document.getElementById('f').addEventListener('submit',async e=>{
  e.preventDefault();
  document.getElementById('err').style.display='none';
  document.getElementById('load').style.display='block';
  try{ await unlock(document.getElementById('pw').value.trim()); }
  catch(err){
    document.getElementById('load').style.display='none';
    document.getElementById('err').style.display='block';
    document.getElementById('pw').value='';document.getElementById('pw').focus();
  }
});
</script>
